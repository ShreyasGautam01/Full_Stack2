spring.application.name=notelink

# ── Database ──────────────────────────────────────────────────────────────────
spring.datasource.url=jdbc:mysql://localhost:3306/notelink_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=DataRetrieval123.
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── JPA / Hibernate ───────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.sql.init.mode=always

# ── JWT ───────────────────────────────────────────────────────────────────────
notelink.app.jwtSecret=noteLinkJwtSecretKey_ChangeThisInProduction_AtLeast256Bits!!
notelink.app.jwtExpirationMs=86400000

# ── File Upload ───────────────────────────────────────────────────────────────
# Stored in backend/uploads/ relative to where mvn spring-boot:run is executed.
# A WebMvcConfigurer in ApplicationConfig serves these files at /uploads/**.
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=10MB
notelink.app.uploadDir=uploads

# ── Server ────────────────────────────────────────────────────────────────────
server.port=8080